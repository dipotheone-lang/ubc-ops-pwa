<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d3b66" />
  <title>UBC Operations</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="../../frontend/assets/icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header id="appbar" class="topbar" style="display:none">
    <button id="menu-toggle" class="icon-btn" aria-label="Menu" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
    <div id="app-title" class="brand">UBC Operations</div>
    <div class="topbar-right">
      <span id="whoami" class="who"></span>
      <button id="lang-btn" class="link-btn">English</button>

  <div class="layout">
    <nav id="sidebar" class="sidebar"><div id="nav"></div></nav>
    <main id="view" class="main"></main>
  </div>

  <div id="root"></div>
  <div id="toast" class="toast"></div>

  <script src="js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</html>
