<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#B62F25" />
  <title>United Brothers Co. — Operations</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/ub-mark.png" type="image/png" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

    <div class="brand"><img class="topbar-mark" src="assets/ub-mark.png" alt="UB" /><span id="app-title">UBC Operations</span></div>

      <span id="whoami" class="who"></span>

  <div class="layout">
    <nav id="sidebar" class="sidebar"><div id="nav"></div></nav>
    <main id="view" class="main"></main>
  </div>

  <div id="root"></div>
  <div id="toast" class="toast"></div>

  <script src="js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/dashboard.js"></script>
